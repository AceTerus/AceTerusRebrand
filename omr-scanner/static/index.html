<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OMR Scanner</title>
  <!-- Socket.IO client served by python-socketio at this path -->
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ------------------------------------------------------------------ */
    /* CSS Custom Properties (light mode defaults)                         */
    /* ------------------------------------------------------------------ */
    :root {
      --bg:         #f0f2f5;
      --surface:    #ffffff;
      --surface-2:  #f7f8fa;
      --border:     #e0e3e8;
      --text:       #1a1d23;
      --text-muted: #6b7280;
      --primary:    #2563eb;
      --primary-h:  #1d4ed8;
      --success:    #16a34a;
      --warning:    #d97706;
      --danger:     #dc2626;
      --amber-bg:   #fffbeb;
      --amber-b:    #fcd34d;
      --radius:     10px;
      --shadow:     0 1px 4px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #0d1117;
        --surface:    #161b22;
        --surface-2:  #21262d;
        --border:     #30363d;
        --text:       #e6edf3;
        --text-muted: #8b949e;
        --primary:    #388bfd;
        --primary-h:  #58a6ff;
        --success:    #3fb950;
        --warning:    #d29922;
        --danger:     #f85149;
        --amber-bg:   #2d2a1f;
        --amber-b:    #9a7a1a;
        --shadow:     0 1px 4px rgba(0,0,0,.4), 0 4px 16px rgba(0,0,0,.3);
      }
    }

    /* ------------------------------------------------------------------ */
    /* Reset & base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ------------------------------------------------------------------ */
    /* Header / nav                                                         */
    /* ------------------------------------------------------------------ */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow);
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      white-space: nowrap;
    }

    nav { display: flex; gap: 4px; }

    .nav-btn {
      background: none;
      border: none;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      transition: background .15s, color .15s;
    }
    .nav-btn:hover  { background: var(--surface-2); color: var(--text); }
    .nav-btn.active { background: var(--primary); color: #fff; }

    /* ------------------------------------------------------------------ */
    /* Main layout                                                          */
    /* ------------------------------------------------------------------ */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) { .grid-2 { grid-template-columns: 1fr; } }

    /* ------------------------------------------------------------------ */
    /* Card                                                                 */
    /* ------------------------------------------------------------------ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }
    .card h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ------------------------------------------------------------------ */
    /* Forms                                                                */
    /* ------------------------------------------------------------------ */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
      color: var(--text-muted);
    }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      transition: border-color .15s;
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
    }

    textarea { resize: vertical; min-height: 120px; font-family: monospace; }

    /* ------------------------------------------------------------------ */
    /* Buttons                                                              */
    /* ------------------------------------------------------------------ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: background .15s, opacity .15s;
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary  { background: var(--primary); color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: var(--primary-h); }
    .btn-outline  { background: var(--surface); border-color: var(--border); color: var(--text); }
    .btn-outline:hover:not(:disabled)  { background: var(--surface-2); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-sm       { padding: 4px 10px; font-size: 12px; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }

    /* ------------------------------------------------------------------ */
    /* Alerts                                                               */
    /* ------------------------------------------------------------------ */
    .alert {
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-top: 12px;
    }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-info    { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    @media (prefers-color-scheme: dark) {
      .alert-success { background: #14532d; color: #86efac; border-color: #16a34a; }
      .alert-error   { background: #450a0a; color: #fca5a5; border-color: #dc2626; }
      .alert-info    { background: #1e3a5f; color: #93c5fd; border-color: #2563eb; }
    }
    .hidden { display: none !important; }

    /* ------------------------------------------------------------------ */
    /* Drop zone                                                            */
    /* ------------------------------------------------------------------ */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      position: relative;
    }
    .drop-zone.drag-over { border-color: var(--primary); background: var(--surface-2); }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .drop-zone-icon { font-size: 36px; margin-bottom: 8px; }
    .drop-zone p    { color: var(--text-muted); font-size: 13px; }

    /* ------------------------------------------------------------------ */
    /* Camera UI                                                            */
    /* ------------------------------------------------------------------ */
    .camera-container {
      position: relative;
      background: #000;
      border-radius: var(--radius);
      overflow: hidden;
      margin-top: 12px;
    }
    #camera-video {
      width: 100%;
      max-height: 340px;
      display: block;
      object-fit: cover;
    }
    .camera-controls {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: rgba(0,0,0,.5);
      justify-content: center;
    }

    /* ------------------------------------------------------------------ */
    /* Preview                                                              */
    /* ------------------------------------------------------------------ */
    #scan-preview {
      width: 100%;
      max-height: 300px;
      object-fit: contain;
      border-radius: 6px;
      border: 1px solid var(--border);
      display: block;
    }

    /* ------------------------------------------------------------------ */
    /* Job cards                                                            */
    /* ------------------------------------------------------------------ */
    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .job-card .job-header {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .job-card .job-id { font-family: monospace; font-size: 11px; color: var(--text-muted); }
    .job-card .job-score { font-size: 22px; font-weight: 700; }
    .job-card .flagged-list { margin-top: 10px; }
    .job-card .flagged-item {
      display: inline-block;
      background: var(--amber-bg);
      border: 1px solid var(--amber-b);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 12px;
      font-weight: 600;
      margin: 3px;
      color: var(--warning);
    }

    /* ------------------------------------------------------------------ */
    /* Status badge                                                         */
    /* ------------------------------------------------------------------ */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .badge-pending    { background: #e0e7ff; color: #4338ca; }
    .badge-processing { background: #fef9c3; color: #713f12; }
    .badge-done       { background: #dcfce7; color: #15803d; }
    .badge-failed     { background: #fee2e2; color: #991b1b; }
    @media (prefers-color-scheme: dark) {
      .badge-pending    { background: #1e1b4b; color: #a5b4fc; }
      .badge-processing { background: #2d2412; color: #fcd34d; }
      .badge-done       { background: #052e16; color: #6ee7b7; }
      .badge-failed     { background: #450a0a; color: #fca5a5; }
    }

    /* ------------------------------------------------------------------ */
    /* Spinner                                                              */
    /* ------------------------------------------------------------------ */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ------------------------------------------------------------------ */
    /* Results table                                                        */
    /* ------------------------------------------------------------------ */
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th {
      text-align: left;
      padding: 10px 12px;
      border-bottom: 2px solid var(--border);
      font-weight: 600;
      color: var(--text-muted);
      white-space: nowrap;
    }
    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody tr.flagged-row { background: var(--amber-bg); }
    tbody tr.flagged-row:hover { filter: brightness(.97); }

    /* ------------------------------------------------------------------ */
    /* Expandable question list                                             */
    /* ------------------------------------------------------------------ */
    .q-detail {
      background: var(--surface-2);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
    }
    .q-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px;
    }
    .q-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
    }
    .q-item.flagged { border-color: var(--amber-b); background: var(--amber-bg); }
    .q-num  { font-weight: 700; min-width: 28px; font-size: 13px; }
    .q-ans  { font-family: monospace; font-weight: 600; min-width: 20px; }
    .q-conf { font-size: 11px; color: var(--text-muted); flex: 1; }

    .override-select {
      width: auto;
      padding: 3px 6px;
      font-size: 12px;
    }

    /* ------------------------------------------------------------------ */
    /* Misc helpers                                                         */
    /* ------------------------------------------------------------------ */
    .text-success { color: var(--success); }
    .text-danger  { color: var(--danger); }
    .text-warning { color: var(--warning); }
    .text-muted   { color: var(--text-muted); }
    .flex-center  { display: flex; align-items: center; gap: 8px; }
    .mt-4  { margin-top: 4px; }
    .mt-8  { margin-top: 8px; }
    .mt-12 { margin-top: 12px; }
    .w100  { width: 100%; }
  </style>
</head>
<body>

<header>
  <h1>&#x25CE; OMR Scanner</h1>
  <nav>
    <button class="nav-btn active" onclick="showPanel('setup')">Setup</button>
    <button class="nav-btn"        onclick="showPanel('scan')">Scan</button>
    <button class="nav-btn"        onclick="showPanel('review')">Review</button>
  </nav>
</header>

<main>

  <!-- ================================================================== -->
  <!-- SETUP PANEL                                                          -->
  <!-- ================================================================== -->
  <section id="panel-setup" class="panel active">
    <div class="grid-2">

      <!-- Create Exam -->
      <div class="card">
        <h2>Create Exam</h2>
        <form id="exam-form">
          <div class="form-group">
            <label for="exam-title">Title</label>
            <input id="exam-title" type="text" placeholder="Midterm Exam" required />
          </div>
          <div class="form-group">
            <label for="exam-questions">Total Questions</label>
            <input id="exam-questions" type="number" value="40" min="1" max="200" required />
          </div>
          <div class="form-group">
            <label for="exam-date">Exam Date</label>
            <input id="exam-date" type="date" required />
          </div>
          <div class="btn-row">
            <button type="submit" class="btn btn-primary">Create Exam</button>
          </div>
        </form>
        <div id="exam-create-msg" class="hidden"></div>
      </div>

      <!-- Upload Answer Key -->
      <div class="card">
        <h2>Upload Answer Key</h2>
        <div class="form-group">
          <label for="setup-exam-select">Exam</label>
          <select id="setup-exam-select">
            <option value="">— select exam —</option>
          </select>
        </div>
        <div class="form-group">
          <label for="answer-key-text">Paste answers (one per line: <code>1,A</code>)</label>
          <textarea id="answer-key-text" placeholder="1,A&#10;2,C&#10;3,B&#10;4,D&#10;5,E"></textarea>
        </div>
        <div class="form-group">
          <label>Or upload .txt / .csv file</label>
          <input id="answer-key-file" type="file" accept=".txt,.csv" />
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" onclick="uploadAnswerKey()">Save Answer Key</button>
        </div>
        <div id="answer-key-msg" class="hidden"></div>
      </div>

    </div>
  </section>

  <!-- ================================================================== -->
  <!-- SCAN PANEL                                                           -->
  <!-- ================================================================== -->
  <section id="panel-scan" class="panel">
    <div class="grid-2">

      <!-- Upload form -->
      <div class="card">
        <h2>Scan Answer Sheet</h2>
        <div class="form-group">
          <label for="scan-exam-select">Exam</label>
          <select id="scan-exam-select">
            <option value="">— select exam —</option>
          </select>
        </div>

        <!-- Drop zone -->
        <div id="drop-zone" class="drop-zone" ondragover="dzDragOver(event)" ondragleave="dzDragLeave()" ondrop="dzDrop(event)">
          <input type="file" id="scan-file-input" accept=".jpg,.jpeg,.png,.pdf" onchange="fileSelected(this.files[0])" />
          <div class="drop-zone-icon">&#x1F4C4;</div>
          <p><strong>Drop file here</strong> or click to browse</p>
          <p class="mt-4">Supports JPEG · PNG · PDF</p>
        </div>

        <div class="btn-row">
          <button class="btn btn-outline" onclick="toggleCamera()">&#x1F4F7; Use Camera</button>
        </div>

        <!-- Camera UI -->
        <div id="camera-ui" class="hidden mt-8">
          <div class="camera-container">
            <video id="camera-video" autoplay playsinline></video>
            <div class="camera-controls">
              <button class="btn btn-primary" onclick="capturePhoto()">&#x23FA; Capture</button>
              <button class="btn btn-outline" onclick="closeCamera()">Close</button>
            </div>
          </div>
        </div>

        <!-- Preview -->
        <div id="preview-wrap" class="hidden mt-8">
          <h3>Preview</h3>
          <img id="scan-preview" alt="Preview" />
          <div class="btn-row mt-8">
            <button id="submit-scan-btn" class="btn btn-primary" onclick="submitScan()">&#x25B6; Submit Scan</button>
            <button class="btn btn-outline" onclick="clearPreview()">Clear</button>
          </div>
        </div>

        <div id="scan-msg" class="hidden mt-8"></div>
      </div>

      <!-- Live job list -->
      <div>
        <div class="card" style="padding-bottom:8px;">
          <h2>Active Jobs</h2>
        </div>
        <div id="job-list">
          <p class="text-muted" style="padding:0 4px;font-size:13px;" id="no-jobs-hint">
            Submit a scan to see live progress.
          </p>
        </div>
      </div>

    </div>
  </section>

  <!-- ================================================================== -->
  <!-- REVIEW PANEL                                                         -->
  <!-- ================================================================== -->
  <section id="panel-review" class="panel">
    <div class="card">
      <div class="flex-center" style="flex-wrap:wrap;gap:12px;">
        <h2 style="margin:0;">Review Results</h2>
        <select id="review-exam-select" style="max-width:260px;" onchange="loadResults()">
          <option value="">— select exam —</option>
        </select>
        <button class="btn btn-outline btn-sm" onclick="loadResults()">&#x21BB; Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table id="results-table">
          <thead>
            <tr>
              <th>Student</th>
              <th>Score</th>
              <th>%</th>
              <th>Flagged</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="results-tbody">
            <tr>
              <td colspan="6" class="text-muted" style="text-align:center;padding:30px;">
                Select an exam to load results.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<!-- Canvas for photo capture (hidden) -->
<canvas id="capture-canvas" class="hidden"></canvas>

<script>
/* ========================================================================
   State
   ======================================================================== */
const state = {
  exams:        [],
  currentFile:  null,     // File | Blob
  cameraStream: null,
  activeJobs:   new Map(), // job_id -> {status, card el}
};

/* ========================================================================
   Socket.IO
   ======================================================================== */
const socket = io('/');

socket.on('scan_complete', (data) => {
  const card = state.activeJobs.get(data.job_id);
  if (!card) return;
  const { score, max_score, percentage, flagged_count } = data;
  card.el.innerHTML = jobCardHTML({
    job_id: data.job_id,
    status: 'done',
    score, max_score, percentage, flagged_count,
    flagged_questions: null,
  });
  card.status = 'done';
  // fetch full details to show flagged questions
  fetchJobDetails(data.job_id).then(j => {
    if (!j) return;
    const flagged = j.omr_results.filter(r => r.is_flagged).map(r => `Q${r.question_number}`);
    card.el.innerHTML = jobCardHTML({
      job_id: data.job_id,
      status: 'done',
      score, max_score, percentage, flagged_count,
      flagged_questions: flagged,
    });
  });
});

socket.on('scan_failed', (data) => {
  const card = state.activeJobs.get(data.job_id);
  if (!card) return;
  card.el.innerHTML = jobCardHTML({ job_id: data.job_id, status: 'failed', error: data.error });
  card.status = 'failed';
});

/* ========================================================================
   Navigation
   ======================================================================== */
function showPanel(name) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  const idx = ['setup','scan','review'].indexOf(name);
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');

  if (name === 'scan' || name === 'review' || name === 'setup') refreshExamSelects();
}

/* ========================================================================
   Exam management
   ======================================================================== */
async function fetchExams() {
  try {
    const res = await fetch('/api/exams');
    if (!res.ok) return [];
    return await res.json();
  } catch { return []; }
}

async function refreshExamSelects() {
  state.exams = await fetchExams();
  const selects = ['setup-exam-select', 'scan-exam-select', 'review-exam-select'];
  selects.forEach(id => {
    const el = document.getElementById(id);
    const prev = el.value;
    el.innerHTML = '<option value="">— select exam —</option>';
    state.exams.forEach(e => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = `${e.title} (${e.exam_date})`;
      if (e.id === prev) opt.selected = true;
      el.appendChild(opt);
    });
  });
}

document.getElementById('exam-form').addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const btn = ev.target.querySelector('[type=submit]');
  btn.disabled = true;

  const payload = {
    title:           document.getElementById('exam-title').value.trim(),
    total_questions: parseInt(document.getElementById('exam-questions').value),
    exam_date:       document.getElementById('exam-date').value,
  };

  try {
    const res = await fetch('/api/exams', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    showMsg('exam-create-msg', `Exam created — ID: ${data.id}`, 'success');
    ev.target.reset();
    refreshExamSelects();
  } catch (e) {
    showMsg('exam-create-msg', e.message, 'error');
  } finally {
    btn.disabled = false;
  }
});

/* ========================================================================
   Answer key upload
   ======================================================================== */
async function uploadAnswerKey() {
  const examId = document.getElementById('setup-exam-select').value;
  if (!examId) { showMsg('answer-key-msg', 'Select an exam first.', 'error'); return; }

  let raw = document.getElementById('answer-key-text').value.trim();

  // If file is selected, read it instead
  const fileInput = document.getElementById('answer-key-file');
  if (!raw && fileInput.files[0]) {
    raw = await fileInput.files[0].text();
  }

  if (!raw) { showMsg('answer-key-msg', 'Paste answer key text or upload a file.', 'error'); return; }

  const items = [];
  for (const line of raw.split('\n')) {
    const parts = line.trim().split(/[,\t]/);
    if (parts.length < 2) continue;
    const q = parseInt(parts[0]);
    const a = parts[1].trim().toUpperCase();
    const pts = parts[2] ? parseFloat(parts[2]) : 1.0;
    if (!isNaN(q) && /^[A-E]$/.test(a)) {
      items.push({ question_number: q, correct_answer: a, points: pts });
    }
  }

  if (items.length === 0) { showMsg('answer-key-msg', 'No valid rows found.', 'error'); return; }

  try {
    const res = await fetch(`/api/exams/${examId}/answer-key`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(items),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    showMsg('answer-key-msg', `Saved ${data.count} answers.`, 'success');
    document.getElementById('answer-key-text').value = '';
    fileInput.value = '';
  } catch (e) {
    showMsg('answer-key-msg', e.message, 'error');
  }
}

/* ========================================================================
   Drag-and-drop
   ======================================================================== */
function dzDragOver(ev) {
  ev.preventDefault();
  document.getElementById('drop-zone').classList.add('drag-over');
}
function dzDragLeave() {
  document.getElementById('drop-zone').classList.remove('drag-over');
}
function dzDrop(ev) {
  ev.preventDefault();
  dzDragLeave();
  const file = ev.dataTransfer.files[0];
  if (file) fileSelected(file);
}

function fileSelected(file) {
  if (!file) return;
  state.currentFile = file;
  const url = URL.createObjectURL(file);
  const preview = document.getElementById('scan-preview');
  preview.src = file.type === 'application/pdf' ? '' : url;
  if (file.type === 'application/pdf') {
    preview.alt = `PDF selected: ${file.name}`;
    preview.style.height = '80px';
  } else {
    preview.style.height = 'auto';
    preview.alt = 'Preview';
  }
  document.getElementById('preview-wrap').classList.remove('hidden');
}

function clearPreview() {
  state.currentFile = null;
  document.getElementById('scan-preview').src = '';
  document.getElementById('preview-wrap').classList.add('hidden');
  document.getElementById('scan-file-input').value = '';
}

/* ========================================================================
   Camera
   ======================================================================== */
async function toggleCamera() {
  const ui = document.getElementById('camera-ui');
  if (!ui.classList.contains('hidden')) { closeCamera(); return; }

  try {
    state.cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } }
    });
    const video = document.getElementById('camera-video');
    video.srcObject = state.cameraStream;
    ui.classList.remove('hidden');
  } catch (e) {
    showMsg('scan-msg', 'Camera access denied: ' + e.message, 'error');
  }
}

function closeCamera() {
  if (state.cameraStream) {
    state.cameraStream.getTracks().forEach(t => t.stop());
    state.cameraStream = null;
  }
  document.getElementById('camera-ui').classList.add('hidden');
}

function capturePhoto() {
  const video  = document.getElementById('camera-video');
  const canvas = document.getElementById('capture-canvas');
  canvas.width  = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob(blob => {
    if (!blob) return;
    state.currentFile = new File([blob], 'capture.jpg', { type: 'image/jpeg' });
    document.getElementById('scan-preview').src = URL.createObjectURL(blob);
    document.getElementById('preview-wrap').classList.remove('hidden');
    closeCamera();
  }, 'image/jpeg', 0.95);
}

/* ========================================================================
   Submit scan
   ======================================================================== */
async function submitScan() {
  const examId = document.getElementById('scan-exam-select').value;
  if (!examId)             { showMsg('scan-msg', 'Select an exam.', 'error');  return; }
  if (!state.currentFile)  { showMsg('scan-msg', 'No file selected.', 'error'); return; }

  const btn = document.getElementById('submit-scan-btn');
  btn.disabled = true;
  showMsg('scan-msg', 'Uploading…', 'info');

  const fd = new FormData();
  fd.append('file', state.currentFile, state.currentFile.name || 'scan.jpg');
  fd.append('exam_id', examId);

  try {
    const res  = await fetch('/api/scan', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    const jobId = data.job_id;
    addJobCard(jobId);
    clearPreview();
    showMsg('scan-msg', `Job queued: ${jobId}`, 'success');

    // Poll as fallback in case Socket.IO misses the event
    pollJobStatus(jobId, 2000);
  } catch (e) {
    showMsg('scan-msg', e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

/* ========================================================================
   Job cards
   ======================================================================== */
function addJobCard(jobId) {
  document.getElementById('no-jobs-hint')?.remove();
  const el = document.createElement('div');
  el.className = 'job-card';
  el.id = `job-${jobId}`;
  el.innerHTML = jobCardHTML({ job_id: jobId, status: 'pending' });
  document.getElementById('job-list').prepend(el);
  state.activeJobs.set(jobId, { el, status: 'pending' });
}

function jobCardHTML({ job_id, status, score, max_score, percentage, flagged_count, flagged_questions, error }) {
  const shortId = job_id.slice(0, 8);
  let body = '';

  if (status === 'pending' || status === 'processing') {
    body = `<div class="flex-center mt-8"><div class="spinner"></div>
              <span class="text-muted">${status === 'pending' ? 'Queued…' : 'Processing…'}</span></div>`;
  } else if (status === 'done') {
    body = `
      <div class="flex-center mt-8">
        <span class="job-score text-success">${score ?? 0} / ${max_score ?? '?'}</span>
        <span class="badge badge-done">done</span>
        <span style="font-size:18px;font-weight:700;">${percentage ?? 0}%</span>
      </div>`;
    if (flagged_count > 0) {
      body += `<div class="flagged-list mt-8"><strong class="text-warning">&#9888; ${flagged_count} flagged</strong><br/>`;
      if (flagged_questions && flagged_questions.length) {
        flagged_questions.forEach(q => { body += `<span class="flagged-item">${q}</span>`; });
      }
      body += '</div>';
    }
  } else if (status === 'failed') {
    body = `<div class="alert alert-error mt-8">&#x274C; Failed: ${escHtml(error || 'Unknown error')}</div>`;
  }

  return `
    <div class="job-header">
      <span class="badge badge-${status}">${status}</span>
      <span class="job-id">${shortId}…</span>
    </div>
    ${body}`;
}

async function fetchJobDetails(jobId) {
  try {
    const res = await fetch(`/api/scan/${jobId}`);
    if (!res.ok) return null;
    return await res.json();
  } catch { return null; }
}

async function pollJobStatus(jobId, interval) {
  let attempts = 0;
  const max    = 60; // ~2 min at 2s intervals
  const timer  = setInterval(async () => {
    attempts++;
    const j = await fetchJobDetails(jobId);
    if (!j) return;
    const card = state.activeJobs.get(jobId);
    if (!card) { clearInterval(timer); return; }

    if (j.status === 'done' || j.status === 'failed') {
      clearInterval(timer);
      if (card.status === 'pending' || card.status === 'processing') {
        // Socket.IO may have already handled it; only update if still pending
        const flagged = j.omr_results?.filter(r => r.is_flagged).map(r => `Q${r.question_number}`) || [];
        card.el.innerHTML = jobCardHTML({
          job_id: jobId, status: j.status,
          score:   j.score?.raw_score,
          max_score: j.score?.max_score,
          percentage: j.score?.percentage,
          flagged_count: flagged.length,
          flagged_questions: flagged,
          error: j.error_message,
        });
        card.status = j.status;
      }
    } else {
      card.status = j.status;
    }
    if (attempts >= max) clearInterval(timer);
  }, interval);
}

/* ========================================================================
   Review panel
   ======================================================================== */
async function loadResults() {
  const examId = document.getElementById('review-exam-select').value;
  const tbody  = document.getElementById('results-tbody');

  if (!examId) {
    tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:30px;">Select an exam.</td></tr>';
    return;
  }

  tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:20px;"><div class="spinner" style="margin:auto;"></div></td></tr>';

  try {
    const res  = await fetch(`/api/exams/${examId}/results`);
    const rows = await res.json();
    if (!res.ok) throw new Error(rows.detail || 'Error');

    if (rows.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-muted" style="text-align:center;padding:30px;">No scans yet.</td></tr>';
      return;
    }

    tbody.innerHTML = '';
    rows.forEach(row => tbody.appendChild(buildResultRow(row)));
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-danger" style="text-align:center;padding:20px;">${escHtml(e.message)}</td></tr>`;
  }
}

function buildResultRow(row) {
  const tr = document.createElement('tr');
  if (row.flagged_count > 0 && row.status === 'done') tr.classList.add('flagged-row');

  const scoreStr = row.raw_score != null
    ? `${row.raw_score} / ${row.max_score}` : '—';
  const pctStr   = row.percentage != null ? `${row.percentage.toFixed(1)}%` : '—';

  tr.innerHTML = `
    <td>${escHtml(row.student_code || '—')}</td>
    <td>${scoreStr}</td>
    <td>${pctStr}</td>
    <td>${row.flagged_count > 0
          ? `<span class="text-warning">&#9888; ${row.flagged_count}</span>`
          : '<span class="text-success">0</span>'}</td>
    <td><span class="badge badge-${row.status}">${row.status}</span></td>
    <td>
      ${row.status === 'done'
        ? `<button class="btn btn-outline btn-sm" onclick="toggleDetail('${row.job_id}', this)">Details</button>`
        : ''}
    </td>`;
  tr.dataset.jobId = row.job_id;
  return tr;
}

async function toggleDetail(jobId, btn) {
  // Remove any existing detail row for this job
  const existing = document.getElementById(`detail-${jobId}`);
  if (existing) { existing.remove(); btn.textContent = 'Details'; return; }

  btn.textContent = 'Loading…';
  btn.disabled    = true;

  const j = await fetchJobDetails(jobId);
  btn.disabled    = false;
  btn.textContent = 'Close';

  if (!j) return;

  const examId = document.getElementById('review-exam-select').value;

  const detailTr = document.createElement('tr');
  detailTr.id = `detail-${jobId}`;

  const itemsHtml = j.omr_results.map(r => {
    const effectiveAnswer = r.is_overridden ? r.override_answer : r.detected_answer;
    const cls  = r.is_flagged ? 'q-item flagged' : 'q-item';
    const icon = r.is_correct ? '&#x2713;' : '&#x2717;';
    const iconCls = r.is_correct ? 'text-success' : 'text-danger';
    const confPct = Math.round(r.confidence * 100);

    const overrideDropdown = r.is_flagged || !r.is_correct ? `
      <select class="override-select" onchange="overrideAnswer('${jobId}','${r.id}',this.value)">
        <option value="">override…</option>
        ${['A','B','C','D','E'].map(a =>
          `<option value="${a}" ${r.override_answer===a?'selected':''}>${a}</option>`
        ).join('')}
      </select>` : '';

    return `<div class="${cls}">
      <span class="q-num">Q${r.question_number}</span>
      <span class="q-ans">${escHtml(effectiveAnswer || '?')}</span>
      <span class="${iconCls}">${icon}</span>
      <span class="q-conf">${confPct}%</span>
      ${overrideDropdown}
    </div>`;
  }).join('');

  detailTr.innerHTML = `<td colspan="6" style="padding:0;">
    <div class="q-detail">
      <p class="text-muted" style="font-size:12px;margin-bottom:10px;">
        Confidence: ${j.overall_confidence != null ? Math.round(j.overall_confidence * 100) : '—'}% overall
        &nbsp;|&nbsp; Score: ${j.score?.raw_score ?? '—'} / ${j.score?.max_score ?? '—'}
        &nbsp;(${j.score?.percentage ?? '—'}%)
      </p>
      <div class="q-grid">${itemsHtml}</div>
    </div>
  </td>`;

  // Insert after parent row
  const parentRow = document.querySelector(`[data-job-id="${jobId}"]`);
  parentRow.insertAdjacentElement('afterend', detailTr);
}

async function overrideAnswer(jobId, resultId, answer) {
  if (!answer) return;
  try {
    const res  = await fetch(`/api/scan/${jobId}/results/${resultId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ override_answer: answer }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    // Refresh detail view
    const detailRow = document.getElementById(`detail-${jobId}`);
    if (detailRow) detailRow.remove();
    // Update parent row score
    await loadResults();
  } catch (e) {
    alert('Override failed: ' + e.message);
  }
}

/* ========================================================================
   Utilities
   ======================================================================== */
function showMsg(elId, text, type) {
  const el = document.getElementById(elId);
  el.className = `alert alert-${type}`;
  el.textContent = text;
  el.classList.remove('hidden');
}

function escHtml(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ========================================================================
   Init
   ======================================================================== */
refreshExamSelects();
</script>
