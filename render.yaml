services:
  - type: web
    name: aceterus
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_GEMINI_API_KEY
        sync: false
      - key: VITE_OMR_API
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
