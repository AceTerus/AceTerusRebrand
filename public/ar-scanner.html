<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AR Scanner | AceTerus</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:  #4e95d9;
      --blue2: #2d7fc4;
      --glow:  rgba(78,149,217,.35);
    }
    body {
      font-family: 'Nunito', sans-serif;
      background: #000;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }
    a-scene {
      position: fixed !important;
      top: 0; left: 0;
      width: 100vw !important;
      height: 100vh !important;
      z-index: 0;
    }
    .back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 100;
      display: none; align-items: center; gap: 8px;
      background: rgba(78,149,217,.15);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(78,149,217,.3);
      color: white; padding: 10px 20px;
      border-radius: 999px; font-family: 'Nunito', sans-serif;
      font-weight: 800; font-size: .9rem; cursor: pointer;
      transition: all .25s; text-decoration: none;
    }
    .back-btn.visible { display: flex; }
    .back-btn:hover { background: rgba(78,149,217,.28); transform: translateX(-3px); }

    .logo-badge {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      display: none; align-items: center; gap: 10px;
      background: rgba(78,149,217,.12);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(78,149,217,.25);
      padding: 8px 16px 8px 10px; border-radius: 999px;
    }
    .logo-badge.visible { display: flex; }
    .logo-badge img { width: 34px; height: 34px; border-radius: 50%; object-fit: contain; }
    .logo-badge span { font-weight: 900; font-size: .95rem; color: white; letter-spacing: .03em; }

    /* scan corners */
    .scan-corner {
      position: fixed; z-index: 90; width: 36px; height: 36px;
      pointer-events: none; opacity: 0; transition: opacity .5s;
    }
    .scan-corner.top-left    { top: 80px; left: 24px; }
    .scan-corner.top-right   { top: 80px; right: 24px; transform: rotate(90deg); }
    .scan-corner.bottom-left { bottom: 32px; left: 24px; transform: rotate(270deg); }
    .scan-corner.bottom-right{ bottom: 32px; right: 24px; transform: rotate(180deg); }
    .scan-corner.visible { opacity: 1; }

    /* status pill */
    #scan-status {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      z-index: 100; display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,.6); backdrop-filter: blur(12px);
      border: 1px solid rgba(78,149,217,.3);
      padding: 10px 22px; border-radius: 999px;
      font-weight: 800; font-size: .85rem; color: rgba(255,255,255,.85);
      opacity: 0; pointer-events: none; transition: opacity .4s;
      white-space: nowrap;
    }
    #scan-status.visible { opacity: 1; }

    .pulse-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--blue);
      animation: pulseDot 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    /* active target badge — shows which target is currently in view */
    #active-badge {
      position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
      z-index: 100;
      background: rgba(78,149,217,.25); backdrop-filter: blur(14px);
      border: 1px solid rgba(78,149,217,.5);
      padding: 10px 24px; border-radius: 999px;
      font-weight: 800; font-size: .88rem; color: white;
      display: flex; align-items: center; gap: 8px;
      opacity: 0; pointer-events: none; transition: opacity .4s;
      white-space: nowrap;
    }
    #active-badge.visible { opacity: 1; }

    /* overlay */
    #scanning-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: linear-gradient(160deg, rgba(10,21,32,.97) 0%, rgba(13,27,42,.95) 100%);
      transition: opacity .6s ease, visibility .6s;
    }
    #scanning-overlay.hidden {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    .rings { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .ring { position: absolute; border-radius: 50%; border: 1px solid rgba(78,149,217,.12); }

    .instruction-card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(78,149,217,.3);
      border-radius: 32px; padding: 40px 34px;
      text-align: center; max-width: 350px; width: 90%;
      box-shadow: 0 28px 70px rgba(0,0,0,.5);
      animation: fadeUp .7s ease;
    }
    .card-logo {
      width: 72px; height: 72px; border-radius: 50%;
      object-fit: contain; margin: 0 auto 18px;
      box-shadow: 0 0 0 3px rgba(78,149,217,.3), 0 8px 28px rgba(78,149,217,.2);
      animation: floatSlow 4s ease-in-out infinite;
      display: block;
    }
    .instruction-card h2 { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
    .instruction-card p { color: rgba(255,255,255,.6); font-size: .88rem; line-height: 1.6; margin-bottom: 22px; }

    .target-chips { display: flex; gap: 8px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap; }
    .chip {
      display: flex; align-items: center; gap: 5px;
      background: rgba(78,149,217,.12); border: 1px solid rgba(78,149,217,.25);
      border-radius: 999px; padding: 5px 12px;
      font-size: .78rem; font-weight: 800; color: rgba(255,255,255,.75);
    }

    .steps { display: flex; flex-direction: column; gap: 9px; margin-bottom: 26px; text-align: left; }
    .step {
      display: flex; align-items: center; gap: 12px;
      background: rgba(78,149,217,.07); border: 1px solid rgba(78,149,217,.16);
      border-radius: 12px; padding: 9px 13px;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white; font-weight: 900; font-size: .75rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step span { font-size: .83rem; font-weight: 700; color: rgba(255,255,255,.8); }

    #start-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--blue), var(--blue2));
      color: white; border: none; border-radius: 999px;
      font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem;
      cursor: pointer; box-shadow: 0 8px 28px var(--glow);
      transition: all .3s cubic-bezier(.34,1.56,.64,1);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    #start-btn:hover { transform: scale(1.04); }
    #start-btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    @keyframes fadeUp    { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes floatSlow { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes pulseDot  { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.6);opacity:.5} }
  </style>
</head>

      <h2>AR Scanner</h2>
      <p>Point your camera at any AceTerus print and watch it come alive in 3D.</p>
      <div class="target-chips">
        <div class="chip">♥ Heart</div>
        <div class="chip">☠ Skull</div>
        <div class="chip">◈ Body</div>
      </div>
      <div class="steps">
        <div class="step"><div class="step-num">1</div><span>Allow camera access when prompted</span></div>
        <div class="step"><div class="step-num">2</div><span>Point at any of your 3 prints</span></div>
        <div class="step"><div class="step-num">3</div><span>Hold your print steady in frame</span></div>
      </div>
      <button id="start-btn">🚀 Start AR Scanner</button>
    </div>
  </div>

  <!--
    IMPORTANT: targets.mind must be compiled from all 3 images in order:
      index 0 = heart image
      index 1 = skull image
      index 2 = body image

    Use the MindAR compiler at https://hiukim.github.io/mind-ar-js-doc/tools/compile
    Upload all 3 images at once and download the single targets.mind file.

    All 3 targets are tracked simultaneously — no switching required.
  -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.001; filterBeta: 0.01; uiLoading: no; uiScanning: no; uiError: no;"
    color-space="sRGB"
    renderer="colorManagement: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <a-assets>
      <a-asset-item id="heart-model" src="./heart.glb"></a-asset-item>
      <a-asset-item id="skull-model" src="./skull.glb"></a-asset-item>
      <a-asset-item id="body-model"  src="./body.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target 0: Heart (index 0 in targets.mind) -->
    <a-entity id="target-heart" mindar-image-target="targetIndex: 0">
      <a-gltf-model
        src="#heart-model"
        position="0 0 0.2"
        scale="0.7 0.7 0.7"
        rotation="90 0 0">>
      </a-gltf-model>
    </a-entity>

    <!-- Target 1: Skull (index 1 in targets.mind) -->
    <a-entity id="target-skull" mindar-image-target="targetIndex: 1">
      <a-gltf-model
        src="#skull-model"
        position="0 0 0.2"
        scale="0.7 0.7 0.7"
        rotation="90 0 0">>
      </a-gltf-model>
    </a-entity>

    <!-- Target 2: Body (index 2 in targets.mind) -->
    <a-entity id="target-body" mindar-image-target="targetIndex: 2">
      <a-gltf-model
        src="#body-model"
        position="0 0 0.0"
        scale="10 10 10"
        rotation="90 0 0">
      </a-gltf-model>
    </a-entity>

  </a-scene>

  <script>
    const TARGETS = [
      { id: 'target-heart', name: 'Heart', icon: '♥' },
      { id: 'target-skull', name: 'Skull', icon: '☠' },
      { id: 'target-body',  name: 'Body',  icon: '◈' },
    ];

    const overlay    = document.getElementById('scanning-overlay');
    const startBtn   = document.getElementById('start-btn');
    const statusPill = document.getElementById('scan-status');
    const badge      = document.getElementById('active-badge');
    const badgeIcon  = document.getElementById('badge-icon');
    const badgeText  = document.getElementById('badge-text');
    const corners    = ['c1','c2','c3','c4'].map(id => document.getElementById(id));

    // Track how many targets are currently visible
    let visibleTargets = new Set();

    function updateBadge() {
      if (visibleTargets.size === 0) {
        badge.classList.remove('visible');
        statusPill.classList.add('visible');
      } else {
        statusPill.classList.remove('visible');
        badge.classList.add('visible');
        const names = [...visibleTargets].map(n => {
          const t = TARGETS.find(x => x.name === n);
          return t ? t.icon + ' ' + t.name : n;
        });
        badgeIcon.textContent = '✨';
        badgeText.textContent = names.join(' · ') + ' — watch it come alive!';
      }
    }

    function bindTargetEvents() {
      TARGETS.forEach(t => {
        const el = document.getElementById(t.id);
        if (!el) return;

        el.addEventListener('targetFound', () => {
          visibleTargets.add(t.name);
          updateBadge();
        });

        el.addEventListener('targetLost', () => {
          visibleTargets.delete(t.name);
          updateBadge();
        });
      });
    }

    startBtn.addEventListener('click', () => {
      startBtn.disabled = true;
      startBtn.textContent = 'Starting camera…';

      overlay.classList.add('hidden');
      corners.forEach(c => c.classList.add('visible'));
      statusPill.classList.add('visible');
      document.getElementById('back-btn').classList.add('visible');
      document.getElementById('logo-badge').classList.add('visible');

      bindTargetEvents();
    });
  </script>
</body>
</html>
