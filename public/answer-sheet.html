<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OMR Answer Sheet</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    @page { size: A4 portrait; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #e8e8e8;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      font-family: 'DM Sans', Arial, sans-serif;
    }

    .print-btn {
      margin-bottom: 18px;
      padding: 10px 30px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      letter-spacing: 0.5px;
    }
    .print-btn:hover { background: #333; }

    .sheet-wrapper {
      background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    }

    svg {
      width: 210mm;
      height: 288.75mm;
      display: block;
      font-family: 'DM Sans', Arial, sans-serif;
    }

    @media print {
      body { background: white; padding: 0; }
      .print-btn { display: none; }
      .sheet-wrapper { box-shadow: none; }
    }
  </style>
</head>
<body>

  <button class="print-btn" onclick="window.print()">&#x1F5A8; Print Answer Sheet</button>

  <div class="sheet-wrapper">
    <svg id="sheet" viewBox="0 0 800 1100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <style>
          .font-serif  { font-family: 'DM Serif Display', serif; }
          .font-sans   { font-family: 'DM Sans', Arial, sans-serif; }
        </style>
      </defs>

      <!-- ═══════════════════════════════════════════════════
           REGISTRATION MARKS — 15×15 filled black squares
           Centres: TL(20,20) TR(765,20) BL(20,1065) BR(765,1065)
           These MUST match template_config.json exactly.
      ════════════════════════════════════════════════════ -->
      <rect x="12.5"  y="12.5"   width="15" height="15" fill="#000"/>
      <rect x="757.5" y="12.5"   width="15" height="15" fill="#000"/>
      <rect x="12.5"  y="1057.5" width="15" height="15" fill="#000"/>
      <rect x="757.5" y="1057.5" width="15" height="15" fill="#000"/>

      <!-- SCAN BORDER — connects reg mark centres; scanner detects everything inside -->
      <rect x="20" y="20" width="745" height="1045"
            fill="none" stroke="#000" stroke-width="2"/>

      <!-- ═══════════════════════════════════════════════════
           HEADER
      ════════════════════════════════════════════════════ -->
      <text x="392" y="55" text-anchor="middle" font-size="24"
            class="font-serif" fill="#000" letter-spacing="5">OBJECTIVE ASSESSMENT</text>

      <line x1="35" y1="62" x2="757" y2="62" stroke="#000" stroke-width="2.5"/>

      <text x="392" y="78" text-anchor="middle" font-size="10" class="font-sans" fill="#444">
        Use a dark pen or pencil · Fill bubbles completely · Erase cleanly if correcting
      </text>

      <!-- ═══════════════════════════════════════════════════
           STUDENT INFO ROW
      ════════════════════════════════════════════════════ -->
      <text x="50"  y="102" font-size="12" class="font-sans" fill="#111" font-weight="700">Student ID:</text>
      <!-- Student ID box — matches template_config.json student_id_region exactly -->
      <rect x="220" y="70" width="360" height="55"
            fill="none" stroke="#000" stroke-width="1.5" rx="3"/>

      <text x="50"  y="140" font-size="11" class="font-sans" fill="#111">Exam:</text>
      <line x1="88" y1="142" x2="390" y2="142" stroke="#888" stroke-width="1"/>
      <text x="430" y="140" font-size="11" class="font-sans" fill="#111">Date:</text>
      <line x1="463" y1="142" x2="757" y2="142" stroke="#888" stroke-width="1"/>

      <!-- Divider under info -->
      <line x1="35" y1="155" x2="757" y2="155" stroke="#ccc" stroke-width="1"/>

      <!-- Centre column divider -->
      <line x1="392" y1="155" x2="392" y2="1050" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

      <!-- Question rows and column headers injected by JS -->
    </svg>
  </div>

  <script>
  (function () {
    const svg = document.getElementById('sheet');
    const NS  = 'http://www.w3.org/2000/svg';

    function el(tag, attrs, text) {
      const e = document.createElementNS(NS, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      if (text !== undefined) e.textContent = text;
      return e;
    }

    // ── Must match template_config.json exactly ──────────────────────────────
    const COLS = [
      { start: 1,  end: 20, labelX: 55,  bubbleStartX: 110 },
      { start: 21, end: 40, labelX: 415, bubbleStartX: 470 },
    ];
    const OPTIONS       = ['A', 'B', 'C', 'D', 'E'];
    const SPACING_X     = 50;
    const ROW_START_Y   = 200;
    const ROW_SPACING_Y = 42;
    const RADIUS        = 10;
    // ─────────────────────────────────────────────────────────────────────────

    COLS.forEach(col => {
      const lastBubbleX = col.bubbleStartX + (OPTIONS.length - 1) * SPACING_X;

      // ── Column header background ──
      svg.appendChild(el('rect', {
        x: col.labelX - 28, y: 163,
        width: lastBubbleX - col.labelX + 68,
        height: 28,
        fill: '#111', rx: '3',
      }));

      // ── Column header labels ──
      svg.appendChild(el('text', {
        x: col.labelX, y: 181,
        'text-anchor': 'middle',
        'font-size': '11', 'font-weight': '700', fill: '#fff',
        'font-family': "'DM Sans', Arial, sans-serif",
      }, 'No.'));

      OPTIONS.forEach((opt, j) => {
        svg.appendChild(el('text', {
          x: col.bubbleStartX + j * SPACING_X, y: 181,
          'text-anchor': 'middle',
          'font-size': '11', 'font-weight': '700', fill: '#fff',
          'font-family': "'DM Sans', Arial, sans-serif",
        }, opt));
      });

      // ── Question rows ──
      for (let q = col.start; q <= col.end; q++) {
        const i  = q - col.start;
        const y  = ROW_START_Y + i * ROW_SPACING_Y;
        const even = i % 2 === 0;

        // Row tint
        svg.appendChild(el('rect', {
          x: col.labelX - 28, y: y - RADIUS - 5,
          width: lastBubbleX - col.labelX + 68,
          height: ROW_SPACING_Y - 2,
          fill: even ? '#f9f9f9' : '#fff',
          rx: '2',
        }));

        // Dashed separator
        svg.appendChild(el('line', {
          x1: col.labelX - 28, y1: y + RADIUS + ROW_SPACING_Y - 7,
          x2: lastBubbleX + 40, y2: y + RADIUS + ROW_SPACING_Y - 7,
          stroke: '#e0e0e0', 'stroke-width': '0.8', 'stroke-dasharray': '3,3',
        }));

        // Question number
        svg.appendChild(el('text', {
          x: col.labelX, y: y + 5,
          'text-anchor': 'middle',
          'font-size': '12', 'font-weight': '700', fill: '#111',
          'font-family': "'DM Sans', Arial, sans-serif",
        }, q));

        // Bubbles
        OPTIONS.forEach((opt, j) => {
          const cx = col.bubbleStartX + j * SPACING_X;
          svg.appendChild(el('circle', {
            cx, cy: y, r: RADIUS,
            fill: '#fff', stroke: '#222', 'stroke-width': '1.8',
          }));
        });
      }
    });
  })();
  </script>

</body>
</html>
