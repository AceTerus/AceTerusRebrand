<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:20px;display:flex;flex-direction:column;gap:14px;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;}
  .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.85);padding:8px 14px;border-radius:9999px;box-shadow:var(--shadow-elegant);font-size:13px;font-weight:500;}
  .dot{width:6px;height:6px;border-radius:9999px;background:hsl(var(--primary));}
  .stat{background:rgba(255,255,255,.85);border:1px solid rgba(0,0,0,.08);border-radius:16px;padding:10px 16px;text-align:center;box-shadow:var(--shadow-elegant);min-width:100px;}
  .stat .v{font-size:22px;font-weight:700;color:hsl(var(--foreground));line-height:1;}
  .stat .l{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:hsl(var(--muted-foreground));margin-top:4px;}
</style></head>
<body>
  <div class="row">
    <div class="pill"><span class="dot"></span>Where learning meets achievement</div>
  </div>
  <div class="row">
    <div class="stat"><div class="v">12K+</div><div class="l">Active learners</div></div>
    <div class="stat"><div class="v">4.3K</div><div class="l">Resources shared</div></div>
    <div class="stat"><div class="v">4.9/5</div><div class="l">Avg. session</div></div>
  </div>
</body></html>
