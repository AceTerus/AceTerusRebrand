<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:url('../assets/background.png') center/cover fixed;}
  body{padding:24px;display:flex;gap:20px;align-items:center;}
  .logo{height:90px;width:auto;filter:drop-shadow(0 10px 30px rgba(37,99,235,.2));}
  .bg{padding:14px 18px;border-radius:18px;background:rgba(255,255,255,.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.4);}
  .tag{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));display:block;margin-top:6px;}
</style></head>
<body>
  <div class="bg"><img src="../assets/logo-round.png" class="logo" alt="AceTerus"><span class="tag">logo-round.png · primary lockup</span></div>
  <div class="bg"><img src="../assets/logo-wordmark.png" class="logo" alt="AceTerus wordmark"><span class="tag">logo-wordmark.png · full lockup</span></div>
</body></html>
