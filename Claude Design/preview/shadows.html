<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  body{padding:30px;display:flex;gap:30px;align-items:center;justify-content:center;}
  .shadow-box{width:140px;height:80px;background:#fff;border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));}
  .s-sm{box-shadow:0 1px 2px rgba(37,99,235,.06);}
  .s-el{box-shadow:0 10px 30px -10px rgba(37,99,235,.15);}
  .s-gl{box-shadow:0 0 40px rgba(90,140,255,.45);}
</style></head>
<body>
  <div class="shadow-box s-sm">shadow-sm</div>
  <div class="shadow-box s-el">shadow-elegant</div>
  <div class="shadow-box s-gl">shadow-glow</div>
</body></html>
