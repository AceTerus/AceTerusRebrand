<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:url('../assets/background.png') center/cover fixed;}
  body{padding:24px;display:flex;gap:16px;align-items:stretch;}
  .card{flex:1;padding:20px;}
  .frosted{border-radius:24px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.7);box-shadow:0 25px 50px -12px rgba(37,99,235,.18);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .solid{border-radius:16px;border:1px solid hsl(var(--border));background:#fff;box-shadow:var(--shadow-elegant);}
  h4{margin:0 0 6px 0;font-family:var(--font-display);font-weight:600;font-size:18px;}
  p{margin:0;color:hsl(var(--muted-foreground));font-size:13px;line-height:1.5;}
  .tag{font-family:var(--font-mono);font-size:10px;color:hsl(var(--muted-foreground));margin-bottom:8px;display:block;}
</style></head>
<body>
  <div class="card frosted">
    <span class="tag">Frosted glass · rounded-3xl</span>
    <h4>Personalize everything</h4>
    <p>Choose topics, pace, and study goals so AceTerus can adapt quizzes to you.</p>
  </div>
  <div class="card solid">
    <span class="tag">Solid · rounded-2xl</span>
    <h4>Your profile</h4>
    <p>Build your academic identity with posts, uploads, and achievements.</p>
  </div>
</body></html>
