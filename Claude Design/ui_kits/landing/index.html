<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AceTerus — Landing (UI Kit)</title>
  <link rel="icon" type="image/png" href="../../assets/logo-round.png" />
  <link rel="stylesheet" href="../../colors_and_type.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    html { background-image: url('../../assets/background.png'); background-size: cover; background-position: center; background-attachment: fixed; }
    body { background: transparent; font-family: var(--font-sans); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="Navbar.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="TrustedBy.jsx"></script>
  <script type="text/babel" src="GetStarted.jsx"></script>
  <script type="text/babel" src="FeatureCards.jsx"></script>
  <script type="text/babel" src="Testimonials.jsx"></script>
  <script type="text/babel" src="FinalCTA.jsx"></script>

  <script type="text/babel">
    function App() {
      React.useEffect(() => {
        const id = setInterval(() => window.lucide && window.lucide.createIcons(), 200);
        return () => clearInterval(id);
      }, []);
      return (
        <div data-screen-label="Landing" className="min-h-screen overflow-hidden text-slate-900">
          <Navbar />
          <main className="pt-20">
            <Hero />
            <TrustedBy />
            <GetStarted />
            <FeatureCards />
            <Testimonials />
            <FinalCTA />
          </main>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
